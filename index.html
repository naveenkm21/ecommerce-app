<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E‑Commerce Demo</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; }
        h1 { color: #333; }
        .product { border: 1px solid #ddd; padding: 10px; margin: 10px; display: inline-block; width: 200px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Our E‑Commerce Store</h1>
        <div class="product">
            <h3>Product 1</h3>
            <p>$19.99</p>
        </div>
        <div class="product">
            <h3>Product 2</h3>
            <p>$29.99</p>
        </div>
        <p>Deployed with <strong>zero downtime</strong> via AWS CodePipeline!</p>
    </div>
</body>
</html>
